name: "Bug"
description: "Something is broken"
labels: ["bug"]
body:
  - type: input
    id: where
    attributes:
      label: "Where"
      placeholder: "app + env, e.g. pharma-qr prod, lotsnap dev (triviz.cloud)"
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: "What happened"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "What should have happened"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: "Steps to reproduce / request-id / logs"
      placeholder: "Optional but every line here saves a round-trip"
