name: "Tech debt"
description: "Refactor, cleanup, performance, reliability"
labels: ["tech-debt"]
body:
  - type: textarea
    id: current
    attributes:
      label: "Current state"
    validations:
      required: true
  - type: textarea
    id: risk
    attributes:
      label: "Risk if left as is"
    validations:
      required: true
  - type: textarea
